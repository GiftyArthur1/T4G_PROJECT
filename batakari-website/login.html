<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batakari Fugu | Login</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="brand">
      <span class="brand-icon">B</span>
      <span class="brand-text">Batakari Fugu</span>
    </a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="header-actions">
      <a href="signup.html" class="btn-secondary">Sign Up</a>
    </div>
    <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle navigation">
      <i class="fa fa-bars"></i>
    </button>
  </nav>

  <!-- AUTH -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="brand-icon">B</span>
        <span>Batakari Fugu</span>
      </div>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <form action="#" method="post">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-icon-wrap">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
          </div>
        </div>
        <div style="text-align:right; margin-bottom:20px;">
          <a href="#" style="font-size:0.85rem; color:var(--accent-dark);">Forgot password?</a>
        </div>
        <button type="submit" class="auth-submit">
          <i class="fa fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('mobileToggle');
    const menu = document.getElementById('navMenu');
    toggle.addEventListener('click', () => menu.classList.toggle('open'));
  </script>
</body>
</html>
